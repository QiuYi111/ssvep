name: StarfieldFireflies
options:
  bundleIdPrefix: com.yourorg.ssvep
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_PREVIEWS: YES
    COMBINE_HIDPI_IMAGES: YES
    CLANG_ENABLE_MODULES: YES

targets:
  StarfieldFireflies:
    type: application
    platform: macOS
    sources:
      - path: StarfieldFireflies
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourorg.ssvep.StarfieldFireflies
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: StarfieldFireflies/StarfieldFireflies.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
    dependencies: []
    info:
      path: StarfieldFireflies/Info.plist
      properties:
        CFBundleDisplayName: "星空与萤火"
        CFBundleName: "$(PRODUCT_NAME)"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
